<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SecurePulse Offline</title>
    <style>
      body { font-family: Inter, Arial, sans-serif; background: #f8fafc; margin: 0; color: #0f172a; }
      main { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
      .card { max-width: 420px; width: 100%; background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(15, 23, 42, 0.08); }
      h1 { margin: 0 0 8px; font-size: 1.4rem; }
      p { margin: 0; color: #475569; line-height: 1.5; }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>You're offline</h1>
        <p>SecurePulse can't load new pages right now. Return to the app home screen to read your most recently cached daily brief.</p>
      </section>
    </main>
  </body>
</html>
